<style>
/* (YOUR ENTIRE CSS STAYS SAME — NO CHANGES NEEDED) */

/* Only fix this missing semicolon in section */
section{
padding:160px 10%;
text-align:center;
opacity:0;
transform:translateY(60px);
transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
will-change: transform, opacity, filter;
}
</style>
</head>

<body>

<!-- YOUR ENTIRE HTML STAYS SAME -->

<script>
const sections = document.querySelectorAll("section");
const nav = document.getElementById("nav");

const reveal = () => {
  sections.forEach((section) => {
    const rect = section.getBoundingClientRect();
    const windowHeight = window.innerHeight;

    if (rect.top < windowHeight * 0.85) {
      section.classList.add("show");
    }
  });

  if (window.scrollY > 50) {
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }

  requestAnimationFrame(reveal);
};

reveal();
</script>

<!-- Instagram button stays same -->

<script>
const logo = document.getElementById("logo");

logo.addEventListener("mousemove", (e) => {
  const x = (e.offsetX - 20) / 10;
  const y = (e.offsetY - 10) / 10;

  logo.style.transform = translate(${x}px, ${y}px);
});

logo.addEventListener("mouseleave", () => {
  logo.style.transform = translate(0px, 0px);
});
</script>

<!-- ✅ EMAILJS (CLEAN FINAL VERSION) -->
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>

<script>
  emailjs.init("R_l20vsN60plrnOTj");

  const form = document.querySelector(".apple-form");
  const btn = document.querySelector(".apple-submit");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    btn.classList.add("loading");

    emailjs.sendForm(
      "service_ea0gdbj",
      "template_irrdx8c",
      this
    ).then(() => {

      btn.classList.remove("loading");
      btn.classList.add("success");

      setTimeout(() => {
        btn.classList.remove("success");
        form.reset();
      }, 2500);

    }).catch((error) => {
      btn.classList.remove("loading");
      alert("Message failed to send");
      console.log(error);
    });
  });
</script>
