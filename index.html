<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HB Visuals | Clean Elite Fix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#05070d;
color:#fff;
overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(59,130,246,0.18), transparent 45%),
radial-gradient(circle at 80% 70%, rgba(255,46,99,0.12), transparent 45%);
z-index:-1;
}

/* NAV */
nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:16px;
z-index:1000;
}

.logo{font-weight:700}

.btn{
padding:12px 24px;
border-radius:30px;
background:linear-gradient(135deg,#ff2e63,#ff6a00);
color:#fff;
text-decoration:none;
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.hero h1{
font-size:56px;
z-index:2;
}

.hero p{
color:#aaa;
margin-top:10px;
z-index:2;
}

/* SECTIONS */
section{
padding:120px 10%;
opacity:0;
transform:translateY(60px);
transition:1s ease;
}

section.show{
opacity:1;
transform:translateY(0);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.card{
padding:25px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:14px;
backdrop-filter:blur(10px);
}

/* FORM */
form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

input,textarea{
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.03);
color:#fff;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50%;
text-decoration:none;
font-size:20px;
z-index:9999;
}

/* INSTAGRAM */
.instagram{
position:fixed;
bottom:20px;
left:20px;
background:rgba(255,255,255,0.08);
padding:14px;
border-radius:50%;
z-index:9999;
}

section{
  padding:120px 10%;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.grid{
  width:100%;
  max-width:1100px;
  justify-content:center;
}

form{
  width:100%;
  max-width:500px;
  margin-top:30px;
}
  
</style>
</head>

<body>

<!-- NAV -->
<nav id="nav">
<div class="logo">HB Visuals</div>
<a class="btn" href="#contact">Start Project</a>
</nav>

<!-- HERO -->
<header class="hero">
<video autoplay muted loop playsinline preload="auto">
  <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
</video>
<h1>We Build Powerful Visual Brands</h1>
<p>Photography, cinematic storytelling & branding</p>
</header>

<!-- ABOUT -->
<section>
<h2>About</h2>
<p style="color:#aaa">We create premium visual identities for modern brands.</p>
</section>

<!-- SERVICES -->
<section>
<h2>Services</h2>
<div class="grid">
<div class="card">🎬 Cinematic Editing</div>
<div class="card">📸 Photography</div>
<div class="card">🚀 Branding</div>
<div class="card">📱 Social Growth</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>
<form>
<input placeholder="Name" required>
<input placeholder="Email" required>
<textarea placeholder="Message"></textarea>
</form>
</section>

<!-- SOCIAL -->
<a class="whatsapp" href="https://wa.me/23058451482">💬</a>
<a class="instagram" href="https://instagram.com/_hitin23_">📷</a>

<!-- SCRIPT -->
<script>
const sections = document.querySelectorAll("section");
const nav = document.getElementById("nav");

function reveal(){
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight * 0.85){
      sec.classList.add("show");
    }
  });
  requestAnimationFrame(reveal);
}

reveal();
<script>
document.addEventListener("click", () => {
  const video = document.querySelector(".hero video");
  if (video) video.play();
});
</script>

</body>
</html>
