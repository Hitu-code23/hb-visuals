<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HB Visuals | Elite Winner+</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:#05070d;
color:#fff;
overflow-x:hidden;
cursor:none;
}

/* NOISE + DEPTH */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(59,130,246,0.18), transparent 45%),
radial-gradient(circle at 80% 70%, rgba(255,46,99,0.12), transparent 45%);
opacity:1;
z-index:-2;
}

/* CURSOR SYSTEM */
.cursor{
width:14px;height:14px;
border:1.5px solid #fff;
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
}

.follower{
width:42px;height:42px;
border:1px solid rgba(255,255,255,0.15);
border-radius:50%;
position:fixed;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9998;
transition:.15s ease;
}

/* NAV */
nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:92%;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 22px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(22px);
border-radius:18px;
z-index:1000;
}

.logo{font-weight:700;letter-spacing:1px}

/* BUTTON */
.btn{
padding:12px 26px;
border-radius:30px;
background:linear-gradient(135deg,#ff2e63,#ff6a00);
color:#fff;
text-decoration:none;
transition:.25s;
display:inline-block;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.35) contrast(1.1);
transform:scale(1.1);
}

/* LAYER DEPTH */
.hero::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center, transparent 20%, #05070d 80%);
}

.hero h1{
font-size:68px;
max-width:900px;
line-height:1.05;
z-index:2;
transform:translateY(20px);
opacity:0;
animation:fadeUp 1s forwards .3s;
}

.hero p{
margin-top:15px;
color:#aaa;
z-index:2;
opacity:0;
animation:fadeUp 1s forwards .5s;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0)}
}

/* SECTION */
section{
padding:140px 10%;
opacity:0;
transform:translateY(70px);
transition:1.2s cubic-bezier(.2,.8,.2,1);
}

section.show{
opacity:1;
transform:translateY(0);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
padding:28px;
border-radius:18px;
backdrop-filter:blur(16px);
transition:.35s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:-50%;
background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
transform:rotate(25deg);
opacity:0;
transition:.4s;
}

.card:hover::before{opacity:1}

.card:hover{
transform:translateY(-12px) scale(1.03);
border-color:#ff2e63;
}

/* FLOAT EFFECT ON SCROLL */
.parallax{
transform:translateY(var(--y));
}

/* FORM */
form{
max-width:600px;
margin:auto;
display:flex;
flex-direction:column;
gap:14px;
}

input,textarea{
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.03);
color:#fff;
outline:none;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50%;
z-index:999;
}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="follower"></div>

<nav>
<div class="logo">HB Visuals</div>
<a class="btn" href="#contact">Start Project</a>
</nav>

<header class="hero">
<video autoplay muted loop playsinline>
<source src="https://files.catbox.moe/zgfvkc.mp4">
</video>

<h1>We Build Elite Visual Experiences</h1>
<p>Design • Branding • Cinematic Storytelling</p>
</header>

<section id="about" class="parallax">
<h2>About Studio</h2>
<p style="color:#aaa">We craft premium digital identities that feel cinematic & alive.</p>
</section>

<section id="services">
<h2>Services</h2>
<div class="grid">
<div class="card">🎬 Cinematic Direction</div>
<div class="card">📸 Photography</div>
<div class="card">🚀 Branding Systems</div>
<div class="card">📱 Growth Strategy</div>
</div>
</section>

<section id="contact">
<h2>Let’s Work</h2>

<form>
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Message"></textarea>
</form>
</section>

<a class="whatsapp" href="https://wa.me/23058451482">💬</a>

<script>
/* CURSOR */
const c=document.querySelector(".cursor");
const f=document.querySelector(".follower");

let x=0,y=0,fx=0,fy=0;

window.addEventListener("mousemove",(e)=>{
x=e.clientX;y=e.clientY;
c.style.left=x+"px";c.style.top=y+"px";
});

function animate(){
fx += (x-fx)*0.12;
fy += (y-fy)*0.12;
f.style.left=fx+"px";
f.style.top=fy+"px";
requestAnimationFrame(animate);
}
animate();

/* SCROLL REVEAL */
const sections=document.querySelectorAll("section");

const reveal=()=>{
sections.forEach(s=>{
if(s.getBoundingClientRect().top < window.innerHeight*0.85){
s.classList.add("show");
}
});
requestAnimationFrame(reveal);
};
reveal();

/* PARALLAX */
window.addEventListener("scroll",()=>{
document.querySelectorAll(".parallax").forEach(el=>{
let speed = window.scrollY * 0.08;
el.style.setProperty("--y", (-speed)+"px");
});
});
</script>

</body>
</html>
